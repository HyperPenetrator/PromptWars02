<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>404 Page Not Found - DRAWstitch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/main.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --theme-teal: #063b50;
            --theme-beige: #dbcac0;
            --theme-light: #f8f9fa;
        }
        body { 
            background-color: var(--theme-light); 
            color: #444; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .error-container { 
            flex: 1;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 4rem 2rem; 
        }
        .error-card { 
            background: #fff; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            overflow: hidden; 
            max-width: 600px; 
            width: 100%; 
            border-top: 8px solid var(--theme-teal);
            transition: transform 0.3s ease;
        }
        .error-card:hover { transform: translateY(-5px); }
        .error-body { padding: 4rem 3rem; }
        .error-icon { 
            font-size: 6rem; 
            color: var(--theme-beige); 
            margin-bottom: 2rem;
            line-height: 1;
        }
        .error-title { 
            color: var(--theme-teal); 
            font-weight: 800; 
            margin-bottom: 1.5rem; 
            font-size: 2.5rem;
        }
        .error-text { 
            font-size: 1.2rem; 
            color: #666; 
            margin-bottom: 2.5rem; 
            line-height: 1.6;
        }
        .btn-home { 
            background-color: var(--theme-teal); 
            color: #fff; 
            border-radius: 50px; 
            padding: 14px 40px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: all 0.3s; 
            border: none; 
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover { 
            background-color: #084c68; 
            color: #fff; 
            box-shadow: 0 10px 20px rgba(6, 59, 80, 0.2);
            transform: scale(1.05);
        }
        
        /* Footer adjustments for error page */
        #bottom { margin-top: auto; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card text-center">
            <div class="error-body wow fadeInUp">
                <div class="error-icon">
                    <i class="bi bi-search"></i>
                </div>
                <h1 class="error-title">404</h1>
                <div class="error-text">
                    <p class="mb-2 fw-bold" style="color: var(--theme-teal);">Oops! Page Not Found</p>
                    <p class="small">We can't seem to find the page you're looking for. It might have been moved or deleted.</p>
                </div>
                <a href="/" class="btn btn-home">Return to Site</a>
            </div>
        </div>
    </div>
