version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: always

  frontend:
    image: node:18-slim
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8001
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
